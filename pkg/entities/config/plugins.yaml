enabled: true
pluginDirectory: plugins
hotReload: false
defaultPermissions:
    - '*'
security:
    sandboxEnabled: false
    allowedPaths: []
    blockedPaths:
        - /etc
        - /sys
        - /proc
    maxMemory: 104857600
    maxCPU: 50
    timeout: 30
logging:
    level: info
    toFile: true
    logDir: logs/plugins
    maxLogSize: 10485760
    maxLogs: 5
    plugins: []

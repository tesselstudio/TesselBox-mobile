# Global Plugin Configuration
enabled: true
pluginDirectory: "plugins"
hotReload: false
defaultPermissions:
  - "entity.create"
  - "entity.get"
  - "event.publish"
  - "world.read"

security:
  sandboxEnabled: false
  allowedPaths:
    - "plugins"
    - "saves"
    - "logs"
  blockedPaths:
    - "/etc"
    - "/sys"
    - "/proc"
    - "/root"
  maxMemory: 104857600  # 100MB in bytes
  maxCPU: 50            # 50% CPU usage
  timeout: 30          # 30 seconds timeout

logging:
  level: "info"
  toFile: true
  logDir: "logs/plugins"
  maxLogSize: 10485760  # 10MB in bytes
  maxLogs: 5
  plugins: []  # Empty means log all plugins

# Plugin-specific configurations will be loaded from individual plugin.yaml files
